<!-- sgp-dashboard.component.html -->
<div class="sgp-dashboard">
  <header class="dashboard-header">
    <h1>
      <span class="material-icons">dashboard</span>
      Baul de Herramientas
    </h1>
  </header>

  <p-tabs [value]="activeTab" (valueChange)="onTabChange($event)" scrollable>
    <p-tablist>
      <p-tab *ngFor="let section of sections; let i = index" [value]="i">
        <span class="material-icons">{{section.icon}}</span>
        <span>{{section.title}}</span>
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel *ngFor="let section of sections; let i = index" [value]="i">
        <div class="tab-content">
          <div class="md-card">
            <div class="md-card-header">
              <div class="md-card-title">{{section.description}}</div>
            </div>

            <div class="md-card-content">
              <!-- Contenedor dinámico para cada sección -->
              <ng-container [ngSwitch]="section.id">

                <!-- Variables SGP y SGR -->
                <div *ngSwitchCase="1">
                  <app-variables-distribucion></app-variables-distribucion>
                </div>

                <!-- Histórico 1994-2001 -->
                <div *ngSwitchCase="2">
                  <app-historico-fiscal></app-historico-fiscal>
                </div>

                <!-- Detalle Histórico -->
                <div *ngSwitchCase="3">
                  <app-detalle-historico></app-detalle-historico>
                </div>

                <!-- Proyección 2025 -->
                <div *ngSwitchCase="4">
                  <app-proyeccion-sgp></app-proyeccion-sgp>
                </div>

                <!-- Histórico SGP -->
                <div *ngSwitchCase="5">
                  <app-historico-sgp></app-historico-sgp>
                </div>

                <!-- Detalle por Entidad -->
                <div *ngSwitchCase="6">
                  <app-detalle-entidad></app-detalle-entidad>
                </div>

                <!-- Eficiencia -->
                <div *ngSwitchCase="7">
                  <app-eficiencia></app-eficiencia>
                </div>

                <!-- Visor Recursos -->
                <div *ngSwitchCase="8">
                  <app-visor-recursos></app-visor-recursos>
                </div>

              </ng-container>
            </div>

            <div class="md-card-actions md-card-actions-end">
              <p-button (onClick)="exportData()">
                <span class="material-icons">file_download</span>
                <span>Exportar Datos</span>
              </p-button>
            </div>
          </div>
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
